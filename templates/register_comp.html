{% extends 'base.html' %}

{% block title %}Company Registration{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">

                <h4 class="mb-4 text-center">Company Registration</h4>

                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">HR / Contact Name</label>
                        <input name="name" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Company Name</label>
                        <input name="company_name" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <button class="btn btn-warning w-100">
                        Register Company
                    </button>
                </form>

                <p class="mt-3 text-muted text-center">
                    * Company login enabled only after admin approval
                </p>

            </div>
        </div>
    </div>
</div>
{% endblock %}
