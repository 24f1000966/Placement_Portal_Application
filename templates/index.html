{% extends 'base.html' %}

{% block title %}Placement Portal{% endblock %}

{% block content %}
<div class="text-center mt-5">

    <h1 class="mb-3">Placement Portal Application</h1>

    <p class="lead">
        A centralized platform for managing campus placements,
        companies, and student applications.
    </p>

    <div class="mt-4">
        <a href="{{ url_for('login') }}" class="btn btn-primary btn-lg me-2">
            Login
        </a>

        <a href="{{ url_for('register_student') }}" class="btn btn-success btn-lg me-2">
            Student Register
        </a>

        <a href="{{ url_for('register_company') }}" class="btn btn-warning btn-lg">
            Company Register
        </a>
    </div>

</div>
{% endblock %}
