{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">
        <div class="card shadow-lg border-0 mt-4 rounded-4">
            <div class="card-header bg-primary text-white text-center py-4 rounded-top-4">
                <h4 class="mb-0 fw-bold">Post a New Placement Drive</h4>
            </div>
            <div class="card-body p-5">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Job Title</label>
                        <input type="text" name="job_title" class="form-control form-control-lg bg-light" required placeholder="Software Engineer">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Description</label>
                        <textarea name="description" class="form-control bg-light" rows="4" required placeholder="Detailed role description and responsibilities..."></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Eligibility Criteria</label>
                        <input type="text" name="eligibility" class="form-control form-control-lg bg-light" required placeholder="B.Tech CS, CGPA > 7.0">
                    </div>
                    <div class="mb-5">
                        <label class="form-label fw-semibold text-secondary">Application Deadline</label>
                        <input type="datetime-local" name="deadline" class="form-control form-control-lg bg-light" required>
                    </div>
                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-primary btn-lg w-50 fw-bold shadow-sm rounded-pill">Create Drive</button>
                        <a href="{{ url_for('company_dashboard') }}" class="btn btn-outline-secondary btn-lg w-50 fw-bold shadow-sm rounded-pill">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
