{% extends "base.html" %}
{% block content %}
<div class="row pt-4 justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-5">
                <h3 class="text-center fw-bold text-primary mb-4 pb-2 border-bottom">Update Placement Drive</h3>
                <form method="POST" action="{{ url_for('edit_drive', drive_id=drive.id) }}">
                    <div class="mb-3">
                        <label class="form-label text-secondary fw-semibold">Job Title</label>
                        <input type="text" class="form-control form-control-lg bg-light" name="job_title" value="{{ drive.job_title }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary fw-semibold">Job Description</label>
                        <textarea class="form-control form-control-lg bg-light" name="description" rows="4" required>{{ drive.description }}</textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-secondary fw-semibold">Eligibility Criteria</label>
                        <input type="text" class="form-control form-control-lg bg-light" name="eligibility" value="{{ drive.eligibility }}" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-pill shadow-sm">Update Drive</button>
                    <a href="{{ url_for('company_dashboard') }}" class="btn btn-outline-secondary btn-lg w-100 fw-bold rounded-pill shadow-sm mt-3">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
