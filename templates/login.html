{% extends "base.html" %}
{% block content %}
<div class="row pt-5 justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-5">
                <h3 class="text-center fw-bold text-primary mb-4 pb-2 border-bottom">Login</h3>
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-4">
                        <label class="form-label text-secondary fw-semibold">Email Account</label>
                        <input type="email" class="form-control form-control-lg bg-light" name="email" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-5">
                        <label class="form-label text-secondary fw-semibold">Password</label>
                        <input type="password" class="form-control form-control-lg bg-light" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-pill shadow-sm">Login to Portal</button>
                </form>
                <div class="text-center mt-4 pt-3 border-top">
                    <span class="text-muted fw-semibold">Don't have an account?</span><br>
                    <a href="{{ url_for('register_student') }}" class="text-decoration-none fw-bold mt-2 d-inline-block">Register here</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
