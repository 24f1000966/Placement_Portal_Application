{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body">

                <h4 class="text-center mb-4">Login</h4>

                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required
                        >
                    </div>

                    <button class="btn btn-primary w-100">
                        Login
                    </button>
                </form>

                <hr>

                <div class="text-center">
                    <p class="mb-1">New Student?</p>
                    <a href="{{ url_for('register_student') }}" class="btn btn-outline-success btn-sm">
                        Register as Student
                    </a>
                </div>

                <div class="text-center mt-2">
                    <p class="mb-1">New Company?</p>
                    <a href="{{ url_for('register_company') }}" class="btn btn-outline-warning btn-sm">
                        Register as Company
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
